\n        (\"SF_DT_TaskConnections\", \"Task Connections\",\r\n         \'Opens the \"TaskConnections_DT\" data table\',\r\n         \"Game/StoryFramework/Core/Blueprints/DataTables/TaskConnections_DT\"),\r\n    ]:\r\n        data_tables_menu.add_menu_entry(\r\n            menu_tables_section,\r\n            unreal.ToolMenuEntryExtensions.init_menu_entry(\r\n                menu_owner, entry_name, display_name, description,\r\n                unreal.ToolMenuStringCommandType.PYTHON, \"\", open_asset_cmd(asset_path)\r\n            )\r\n        )\r\n\r\n    # --- UI Tables\r\n    for entry_name, display_name, description, asset_path in [\r\n        (\"SF_DT_InputIconMappings\", \"Input Icon Mappings\",\r\n         \'Opens the \"InputMap_DT\" data table\',\r\n         \"Game/StoryFramework/Core/Blueprints/DataTables/InputMap_DT\"),\r\n    ]:\r\n        data_tables_menu.add_menu_entry(\r\n            ui_tables_section,\r\n            unreal.ToolMenuEntryExtensions.init_menu_entry(\r\n                menu_owner, entry_name, display_name, description,\r\n                unreal.ToolMenuStringCommandType.PYTHON, \"\", open_asset_cmd(asset_path)\r\n            )\r\n        )\r\n\r\n    # Clear Game Save Data (bottom of SF General)\r\n    clear_saves_cmd = (\r\n        \'import unreal; slot=\"SFSaveSlot\"; idx=0; \'\r\n        \'deleted = unreal.GameplayStatics.delete_game_in_slot(slot, idx); \'\r\n        \'unreal.log(\"Clear Game Save Data: slot=%s, user_index=%d, result=%s\" % (slot, idx, \"deleted\" if deleted else \"no file found\"))\'\r\n    )\r\n    clear_saves_entry = unreal.ToolMenuEntryExtensions.init_menu_entry(\r\n        menu_owner,\r\n        \"ClearGameSaveData\",\r\n        \"Clear Game Save Data\",\r\n        \'Deletes the game save file stored in the slot named \"SFSaveSlot\". Use this to reset local save data created during play sessions.\',\r\n        unreal.ToolMenuStringCommandType.PYTHON,\r\n        \"\",\r\n        clear_saves_cmd\r\n    )\r\n    sub_menu.add_menu_entry(section_general, clear_saves_entry)\r\n\r\n    # --------------------------------------------------------------------\r\n    # SECTION 3: SF Example — sub-menus\r\n    # --------------------------------------------------------------------\r\n    # Example Levels submenu\r\n    example_levels_menu = sub_menu.add_sub_menu(\r\n        menu_owner,\r\n        section_example,\r\n        \"ExampleLevelsSubMenu\",\r\n        \"Example Levels\",\r\n        \"Open example maps provided with Story Framework.\"\r\n    )\r\n    ex_levels_section = \"Default\"\r\n    try:\r\n        example_levels_menu.add_section(ex_levels_section, \"Example Levels\")\r\n    except Exception:\r\n        pass\r\n\r\n    for entry_name, display_name, description, level_path in [\r\n        (\"ExampleContentLevel\", \"Example Content Level\",\r\n         \'Opens the \"ExampleMap\" level\',\r\n         \"Game/StoryFramework/Core/Example/Level/ExampleMap\"),\r\n        (\"ExampleMainMenuLevel\", \"Example Main Menu Level\",\r\n         \'Opens the \"ExampleMainMenu\" level\',\r\n         \"Game/StoryFramework/Core/Example/Level/ExampleMainMenu\"),\r\n\r\n        # NEW LEVEL (bottom)\r\n        (\"InspectAnimationLevel\", \"Animation Inspection\",\r\n         \'Opens the \"InspectAnimation\" level\',\r\n         \"Game/StoryFramework/Core/Example/Level/InspectAnimation\"),\r\n    ]:\r\n        example_levels_menu.add_menu_entry(\r\n            ex_levels_section,\r\n            unreal.ToolMenuEntryExtensions.init_menu_entry(\r\n                menu_owner, entry_name, display_name, description,\r\n                unreal.ToolMenuStringCommandType.PYTHON, \"\", load_level_cmd(level_path)\r\n            )\r\n        )\r\n\r\n    # Example Player Classes submenu\r\n    example_players_menu = sub_menu.add_sub_menu(\r\n        menu_owner,\r\n        section_example,\r\n        \"ExamplePlayerClassesSubMenu\",\r\n        \"Example Player Classes\",\r\n        \"Open example player blueprint