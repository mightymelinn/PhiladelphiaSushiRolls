+StartupScripts="import unreal\r\nimport os\r\n\r\n# ------------------------------------------------------------------------\r\n# Basic setup for toolbar creation\r\n# ------------------------------------------------------------------------\r\n\r\nmenu_owner = \"ExampleOwnerName\"\r\ntool_menus = unreal.ToolMenus.get()\r\nowning_menu_name = \"LevelEditor.LevelEditorToolBar.PlayToolBar\"\r\n\r\nproject_directory = unreal.SystemLibrary.get_project_directory()\r\npython_code_directory = os.path.join(project_directory, \'PythonCode\')\r\n\r\n\r\n# ------------------------------------------------------------------------\r\n# Define our toolbar button class\r\n# ------------------------------------------------------------------------\r\n@unreal.uclass()\r\nclass Example_SubMenuEntry(unreal.ToolMenuEntryScript):\r\n    def init_as_toolbar_button(self):\r\n        self.data.menu = owning_menu_name\r\n        self.data.advanced.entry_type = unreal.MultiBlockType.TOOL_BAR_COMBO_BUTTON\r\n        self.data.icon = unreal.ScriptSlateIcon(\"EditorStyle\", \"Icons.Documentation\")\r\n        self.data.advanced.style_name_override = \"CalloutToolbar\"\r\n\r\n\r\n# ------------------------------------------------------------------------\r\n# Main function that builds the actual toolbar and menu entries\r\n# ------------------------------------------------------------------------\r\ndef Run():\r\n    entry = Example_SubMenuEntry()\r\n    entry.init_as_toolbar_button()\r\n\r\n    entry.init_entry(\r\n        menu_owner,\r\n        owning_menu_name,\r\n        \"\",\r\n        \"exampleToolbarEntry\",\r\n        \"Story Framework\",\r\n        \"Useful Story Framework Links\"\r\n    )\r\n\r\n    submenu_name = owning_menu_name + \".exampleToolbarEntry\"\r\n    sub_menu = tool_menus.register_menu(\r\n        submenu_name, \"\", unreal.MultiBoxType.MENU, False\r\n    )\r\n\r\n    # Sections\r\n    section_story   = \"StoryFrameworkSection\"\r\n    section_general = \"SFGeneralSection\"\r\n    section_example = \"SFExampleSection\"\r\n    section_other   = \"SFOtherSection\"\r\n\r\n    for section_id, label in [\r\n        (section_story, \"Story Framework 5.2\"),\r\n        (section_general, \"SF General\"),\r\n        (section_example, \"SF Example\"),\r\n        (section_other, \"SF Other\"),\r\n    ]:\r\n        try:\r\n            sub_menu.add_section(section_id, label)\r\n        except Exception:\r\n            pass\r\n\r\n    # --------------------------------------------------------------------\r\n    # Helpers\r\n    # --------------------------------------------------------------------\r\n    def open_asset_cmd(asset_path: str) -> str:\r\n        \"\"\"Return a one-liner to open an asset in the editor.\"\"\"\r\n        if asset_path.startswith(\"Game/\"):\r\n            asset_path_fixed = \"/\" + asset_path\r\n        elif not asset_path.startswith(\"/Game/\"):\r\n            asset_path_fixed = \"/Game/\" + asset_path\r\n        else:\r\n            asset_path_fixed = asset_path\r\n        return (\r\n            \'import unreal; \'\r\n            f\'asset = unreal.EditorAssetLibrary.load_asset(\"{asset_path_fixed}\"); \'\r\n            \'editor = unreal.get_editor_subsystem(unreal.AssetEditorSubsystem); \'\r\n            \'editor.open_editor_for_assets([asset]) if asset else unreal.log_warning(\'\r\n            f\'\"Asset not found: {asset_path_fixed}\")\'\r\n        )\r\n\r\n    def load_level_cmd(level_path: str) -> str:\r\n        \"\"\"One-liner to prompt save + load a level.\"\"\"\r\n        if level_path.startswith(\"Game/\"):\r\n            asset_path = \"/\" + level_path\r\n        elif not level_path.startswith(\"/Game/\"):\r\n            asset_path = \"/Game/\" + level_path\r\n        else:\r\n            asset_path = level_path\r\n        return (\r\n            \'import unreal; \'\r\n            f\'level_path = \"{asset_path}\"; \'\r\n            \'pm = unreal.EditorLoadingAndSavingUtils.save_dirty_packages(True, True); \'\r\n            \'fn = getattr(unreal.EditorLoadingAndSavingUtils, \"save_dirty_content_packages\", None); \'\r\n            \'pa = (fn(True) if fn else True); \'\r\n            \'proceeded = (pm and pa); \'\r\n            \'(unreal.get_editor_subsystem(unreal.LevelEditorSubsystem).load_level(level_path) \'\r\n            \' if proceeded else unreal.log_warning(\"Level load cancelled or unsaved changes not saved.\"))\'\r\n        )\r\n\r\n    # --------------------------------------------------------------------\r\n    # SECTION 1: Story Framework 5.2\r\n    # --------------------------------------------------------------------\r\n    docs_entry = unreal.ToolMenuEntryExtensions.init_menu_entry(\r\n        menu_owner,\r\n        \"Documentation\",\r\n        \"📄 Official Documentation\",\r\n        \"Opens the official Story Framework documentation in your web browser.\",\r\n        unreal.ToolMenuStringCommandType.PYTHON,\r\n        \"\",\r\n        \'unreal.SystemLibrary.launch_url(\"https://visualonecompany.gitbook.io/home\")\'\r\n    )\r\n    sub_menu.add_menu_entry(section_story, docs_entry)\r\n\r\n    # --------------------------------------------------------------------\r\n    # SECTION 2: SF General\r\n    # --------------------------------------------------------------------\r\n    # Framework Settings\r\n    customize_cmd = (\r\n        \'import unreal; asset=unreal.EditorAssetLibrary.load_asset(\"/Game/StoryFramework/StoryFrameworkValues\"); \'\r\n        \'editor=unreal.get_editor_subsystem(unreal.AssetEditorSubsystem); \'\r\n        \'editor.open_editor_for_assets([asset]) if asset else unreal.log_warning(\"Asset not found: /Game/StoryFramework/StoryFrameworkValues\")\'\r\n    )\r\n    customize_entry = unreal.ToolMenuEntryExtensions.init_menu_entry(\r\n        menu_owner,\r\n        \"FrameworkSettings\",\r\n        \"Framework Settings\",\r\n        \'Opens the \"StoryFrameworkValues\" asset\',\r\n        unreal.ToolMenuStringCommandType.PYTHON,\r\n        \"\",\r\n        customize_cmd\r\n    )\r\n    sub_menu.add_menu_entry(section_general, customize_entry)\r\n\r\n    # Editor Tool Menu\r\n    tools_cmd = (\r\n        \'import unreal; asset = unreal.EditorAssetLibrary.load_asset(\"/Game/StoryFramework/Utility/SFTools_EUW\"); \'\r\n        \'ss = unreal.get_editor_subsystem(unreal.EditorUtilitySubsystem); \'\r\n        \'ss.spawn_and_register_tab(asset)\'\r\n    )\r\n    tools_entry = unreal.ToolMenuEntryExtensions.init_menu_entry(\r\n        menu_owner,\r\n        \"EditorToolMenu\",\r\n        \"Editor Tool Menu\",\r\n        \'Opens the \"SFTools_EUW\" editor utility widget\',\r\n        unreal.ToolMenuStringCommandType.PYTHON,\r\n        \"\",\r\n        tools_cmd\r\n    )\r\n    sub_menu.add_menu_entry(section_general, tools_entry)\r\n\r\n    # Core Components (submenu inside SF General, above Clear Save)\r\n    core_menu = sub_menu.add_sub_menu(\r\n        menu_owner,\r\n        section_general,\r\n        \"CoreComponentsSubMenuEntry\",\r\n        \"Core Components\",\r\n        \"Open core Story Framework component assets.\"\r\n    )\r\n\r\n    # --- Sections inside Core Components\r\n    interaction_section = \"InteractionSection\"\r\n    cinematics_section  = \"CinematicsSection\"\r\n    camera_section      = \"PlayerCameraSection\"\r\n    save_section        = \"SaveSection\"\r\n\r\n    for sec_id, sec_label in [\r\n        (interaction_section, \"Interaction\"),\r\n        (cinematics_section,  \"Cinematics\"),\r\n        (camera_section,      \"Player Camera\"),\r\n        (save_section,        \"Save Game\"),\r\n    ]:\r\n        try:\r\n            core_menu.add_section(sec_id, sec_label)\r\n        except Exception:\r\n            pass\r\n\r\n    # --- Interaction\r\n    for entry_name, display_name, description, asset_path in [\r\n        (\"SFComp_InteractionManager\", \"Interaction Manager\",\r\n         \'Opens the \"SFInteractionManager_AC\" component\',\r\n         \"Game/StoryFramework/Core/